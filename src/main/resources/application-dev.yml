spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://keycloak.animal-adoption.com.br/realms/MY_KEYCLOAK
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/control_image}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123ateo9}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: file
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${SCHEMA_NAME:file}
  sql:
    init:
      mode: always
      encoding: UTF-8

server:
  port: 8082

upload:
  dir: uploads

keycloak-config:
  client-id: ANIMAL_ADOPTION_CLIENT
  client-secret: rb308smILPAIuMrKYBqF9XrLwAPLd4Xm
base-url: http://localhost:8082